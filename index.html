<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List with Sidebar</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --sidebar-bg: #ffffff;
            --border: #eeeeee;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --sidebar-bg: #252525;
            --border: #333333;
        }

        * { box-sizing: border-box; transition: background-color 0.3s; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            justify-content: center;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            position: fixed;
            left: -250px; /* Hidden by default */
            top: 0;
            width: 250px;
            height: 100%;
            background: var(--sidebar-bg);
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            z-index: 1000;
            padding: 20px;
        }

        .sidebar.active { left: 0; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        .overlay.active { display: block; }

        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-color);
        }

        .sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        /* --- Main UI --- */
        .container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--container-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            margin: 80px 15px 20px 15px;
        }

        .input-group { display: flex; gap: 8px; margin-bottom: 25px; }
        input[type="text"] { 
            flex-grow: 1; padding: 12px; border: 2px solid var(--border); 
            border-radius: 6px; background: var(--container-bg); color: var(--text-color);
        }
        
        button#addBtn { 
            padding: 12px 20px; cursor: pointer; background-color: #007bff; 
            color: white; border: none; border-radius: 6px; font-weight: bold; 
        }

        ul { list-style: none; padding: 0; }
        li { 
            padding: 15px 5px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; gap: 12px; 
        }
        .completed { color: #888; text-decoration: line-through; }
        .delete { color: #dc3545; cursor: pointer; margin-left: auto; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h3>Settings</h3>
        <div class="sidebar-item">
            <span>Dark Mode</span>
            <button onclick="toggleDarkMode()" id="themeBtn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🌙</button>
        </div>
    </div>

    <div class="container">
        <h2 style="text-align: center;">🎯 My Focus List</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="New task...">
            <button id="addBtn" onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        getTasks();
        checkTheme();
    });

    // --- Sidebar Logic ---
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    // --- Theme Logic ---
    function toggleDarkMode() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    function checkTheme() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerText = '☀️';
        }
    }

    // --- Task Logic ---
    function addTask() {
        const input = document.getElementById('taskInput');
        if (input.value.trim() === "") return;
        const taskObj = { text: input.value, completed: false };
        createTaskElement(taskObj);
        saveLocalTask(taskObj);
        input.value = "";
    }

    function createTaskElement(taskObj) {
        const li = document.createElement('li');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = taskObj.completed;
        checkbox.style.transform = "scale(1.3)";
        checkbox.onclick = () => {
            const span = li.querySelector('.task-text');
            span.classList.toggle('completed');
            if (checkbox.checked) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            updateLocalStatus(taskObj.text);
        };

        const span = document.createElement('span');
        span.className = 'task-text' + (taskObj.completed ? ' completed' : '');
        span.innerText = taskObj.text;
        span.style.flexGrow = "1";

        const delBtn = document.createElement('span');
        delBtn.innerHTML = '✕';
        delBtn.className = 'delete';
        delBtn.onclick = () => { removeLocalTask(taskObj.text); li.remove(); };

        li.append(checkbox, span, delBtn);
        document.getElementById('taskList').appendChild(li);
    }

    function saveLocalTask(task) {
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        tasks.push(task);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function getTasks() {
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        tasks.forEach(task => createTaskElement(task));
    }

    function updateLocalStatus(text) {
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.map(t => t.text === text ? { ...t, completed: !t.completed } : t);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function removeLocalTask(text) {
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.filter(t => t.text !== text);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }
</script>

</body>
</html>
