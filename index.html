<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Aligned To-Do</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --sidebar-bg: #ffffff;
            --border: #eeeeee;
            --accent: #007bff;
            --overdue: #dc3545;
        }

        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --sidebar-bg: #252525;
            --border: #333333;
        }

        * { box-sizing: border-box; transition: background-color 0.2s, color 0.2s; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background-color: var(--bg-color); 
            color: var(--text-color); display: flex; justify-content: center;
        }

        /* Sidebar & Navigation */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--sidebar-bg); box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: left 0.3s ease; z-index: 1000; padding: 30px 20px; }
        .sidebar.active { left: 0; }
        .sidebar h2 { margin-top: 0; font-size: 1.4rem; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.active { display: block; }
        
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; cursor: pointer; background: none; border: none; color: var(--text-color); z-index: 10; padding: 10px; }

        /* Main Container */
        .container { width: 100%; max-width: 500px; background: var(--container-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 80px 15px 20px 15px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .input-row { display: flex; gap: 8px; }
        
        input[type="text"], input[type="date"] { 
            padding: 12px; border: 2px solid var(--border); border-radius: 6px; 
            background: var(--container-bg); color: var(--text-color); font-size: 16px; outline: none;
        }
        input[type="text"] { flex-grow: 1; }
        
        button#addBtn { padding: 12px; cursor: pointer; background-color: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; }

        /* Task List */
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px 5px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        
        .task-label { display: flex; align-items: center; gap: 12px; flex-grow: 1; cursor: pointer; overflow: hidden; }
        
        /* THE FIX: Flex column with center justification handles the vertical alignment */
        .task-info { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            flex-grow: 1; 
            min-height: 24px; /* Matches checkbox height roughly */
        }
        
        .task-text { font-weight: 500; word-wrap: break-word; line-height: 1.2; }
        
        /* THE FIX: Empty :empty selector hides the tag so it doesn't push the text up */
        .due-tag:empty { display: none; }
        .due-tag { font-size: 0.75rem; color: #777; margin-top: 3px; }
        
        .overdue { color: var(--overdue) !important; font-weight: bold; }
        
        .completed { text-decoration: line-through; opacity: 0.5; }
        .delete { color: var(--overdue); cursor: pointer; padding: 10px; font-weight: bold; flex-shrink: 0; }
        
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #28a745; flex-shrink: 0; margin: 0; }

        .settings-label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #888; margin-top: 30px; display: block; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2>📅 My Tasks</h2>
        <span class="settings-label">Preferences</span>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <span>Theme</span>
            <button onclick="toggleTheme()" id="themeBtn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="New task...">
            <div class="input-row">
                <input type="date" id="dateInput" style="flex-grow: 1;">
                <button id="addBtn" onclick="addTask()">Add</button>
            </div>
        </div>
        <ul id="taskList"></ul>
    </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderTasks();
        checkTheme();
    });

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    function checkTheme() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').innerText = '☀️';
        }
    }

    function addTask() {
        const nameInput = document.getElementById('taskInput');
        const dateInput = document.getElementById('dateInput');
        if (nameInput.value.trim() === "") return;

        const taskObj = {
            id: Date.now(),
            text: nameInput.value,
            date: dateInput.value,
            completed: false
        };

        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        tasks.push(taskObj);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        
        renderTasks();
        nameInput.value = "";
        dateInput.value = "";
    }

    function formatTaskDate(dateStr) {
        if (!dateStr) return "";
        const [year, month, day] = dateStr.split('-');
        return `${month}/${day}/${year}`;
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = "";
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

        tasks.sort((a, b) => {
            if (!a.date) return 1;
            if (!b.date) return -1;
            return new Date(a.date) - new Date(b.date);
        });

        const today = new Date().setHours(0,0,0,0);

        tasks.forEach(task => {
            const li = document.createElement('li');
            const isOverdue = task.date && new Date(task.date) < today && !task.completed;
            const displayDate = formatTaskDate(task.date);
            const checkId = `check-${task.id}`;

            // Modified: Only insert text into .due-tag if displayDate exists
            li.innerHTML = `
                <input type="checkbox" id="${checkId}" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                <label for="${checkId}" class="task-label">
                    <div class="task-info ${task.completed ? 'completed' : ''}">
                        <span class="task-text">${task.text}</span>
                        <span class="due-tag ${isOverdue ? 'overdue' : ''}">${displayDate ? 'Due: ' + displayDate : ''}</span>
                    </div>
                </label>
                <span class="delete" onclick="deleteTask(${task.id})">✕</span>
            `;
            list.appendChild(li);
        });
    }

    function toggleComplete(id) {
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        const task = tasks.find(t => t.id === id);
        if(!task) return;
        
        task.completed = !task.completed;
        if (task.completed) {
            confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } });
        }
        localStorage.setItem('tasks', JSON.stringify(tasks));
        setTimeout(renderTasks, 10);
    }

    function deleteTask(id) {
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        renderTasks();
    }
</script>

</body>
</html>
