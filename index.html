<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive To-Do List</title>
    <style>
        /* 1. Global Reset for better spacing */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px; /* Reduced padding for mobile */
            background-color: #f4f7f6; 
            margin: 0;
        }

        .container { 
            width: 100%;        /* Default to full width */
            max-width: 500px;   /* But never wider than 500px on desktop */
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-top: 20px;
        }

        /* 2. Responsive adjustments */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 8px; }
            h2 { font-size: 1.5rem; }
            button#addBtn { padding: 12px 15px; }
        }

        h2 { margin-top: 0; color: #333; text-align: center; }
        .input-group { display: flex; gap: 8px; margin-bottom: 25px; }
        
        input[type="text"] { 
            flex-grow: 1; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 6px; 
            outline: none; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }
        
        input[type="text"]:focus { border-color: #007bff; }
        
        button#addBtn { 
            padding: 12px 20px; 
            cursor: pointer; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li { 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            padding: 15px 5px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; accent-color: #28a745; }
        .task-text { flex-grow: 1; cursor: pointer; color: #333; word-break: break-word; }
        .completed { color: #aaa; text-decoration: line-through; }
        .delete { color: #dc3545; cursor: pointer; font-weight: bold; margin-left: auto; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 My Focus List</h2>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="New task...">
        <button id="addBtn" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
    // Logic remains same as previous version to preserve LocalStorage & Confetti
    document.addEventListener('DOMContentLoaded', getTasks);

    function addTask() {
        const input = document.getElementById('taskInput');
        if (input.value.trim() === "") return;
        const taskObj = { text: input.value, completed: false };
        createTaskElement(taskObj);
        saveLocalTask(taskObj);
        input.value = "";
    }

    function createTaskElement(taskObj) {
        const li = document.createElement('li');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = taskObj.completed;
        checkbox.onclick = () => toggleComplete(li, checkbox, taskObj.text);

        const span = document.createElement('span');
        span.className = 'task-text' + (taskObj.completed ? ' completed' : '');
        span.innerText = taskObj.text;

        const delBtn = document.createElement('span');
        delBtn.className = 'delete';
        delBtn.innerHTML = '✕';
        delBtn.onclick = () => {
            removeLocalTask(taskObj.text);
            li.remove();
        };

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        document.getElementById('taskList').appendChild(li);
    }

    function toggleComplete(li, checkbox, text) {
        const span = li.querySelector('.task-text');
        span.classList.toggle('completed');
        if (checkbox.checked) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.map(t => t.text === text ? { ...t, completed: !t.completed } : t);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function saveLocalTask(task) {
        let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
        tasks.push(task);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function getTasks() {
        let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
        tasks.forEach(task => createTaskElement(task));
    }

    function removeLocalTask(text) {
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.filter(t => t.text !== text);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }
</script>

</body>
</html>
